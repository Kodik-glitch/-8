<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Глобальный Чат</title>
  <style>
    /* Переменные для тем оформления */
    :root {
      --bg-color: #f0f2f5;
      --chat-bg: #ffffff;
      --text-color: #333333;
      --msg-bg: #e9ecef;
      --msg-text: #333333;
      --border-color: #eeeeee;
      --input-bg: #ffffff;
      --time-color: #888888;
    }

    [data-theme="dark"] {
      --bg-color: #18191a;
      --chat-bg: #242526;
      --text-color: #e4e6eb;
      --msg-bg: #3a3b3c;
      --msg-text: #e4e6eb;
      --border-color: #3e4042;
      --input-bg: #3a3b3c;
      --time-color: #b0b3b8;
    }

    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      flex-direction: column; 
      height: 90vh; 
      background: var(--bg-color); 
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
    }

    #chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 600px;
      margin: 0 auto 10px auto;
    }

    #header-info h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    #online-status {
      font-size: 0.9rem;
      color: #28a745;
      font-weight: bold;
      margin: 5px 0 0 0;
    }

    #theme-toggle {
      background: none;
      border: 2px solid #007bff;
      color: #007bff;
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }

    #theme-toggle:hover {
      background: #007bff;
      color: white;
    }

    #chat-container { 
      width: 100%; 
      max-width: 600px; 
      margin: auto; 
      display: flex; 
      flex-direction: column; 
      height: 100%; 
      background: var(--chat-bg); 
      border-radius: 12px; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      overflow: hidden; 
      border: 1px solid var(--border-color);
    }

    #messages { 
      list-style-type: none; 
      margin: 0; 
      padding: 20px; 
      flex-grow: 1; 
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
    }

    #messages li { 
      padding: 10px 15px; 
      background: var(--msg-bg); 
      color: var(--msg-text);
      border-radius: 15px; 
      max-width: 70%; 
      align-self: flex-start; 
      word-break: break-word; 
      position: relative;
      display: flex;
      flex-direction: column;
    }

    #messages li.my-msg { 
      background: #007bff; 
      color: white; 
      align-self: flex-end; 
    }

    /* Стиль для времени сообщения */
    .msg-time {
      font-size: 0.75rem;
      color: var(--time-color);
      align-self: flex-end;
      margin-top: 4px;
    }

    #messages li.my-msg .msg-time {
      color: #e0e0e0; /* Светлое время на синем фоне */
    }

    #form { 
      display: flex; 
      padding: 15px; 
      border-top: 1px solid var(--border-color); 
      background: var(--chat-bg); 
    }

    #input-name { 
      width: 100px; 
      padding: 10px; 
      border: 1px solid var(--border-color); 
      border-radius: 8px; 
      margin-right: 10px; 
      background: var(--input-bg);
      color: var(--text-color);
    }

    #input-msg { 
      flex-grow: 1; 
      padding: 10px; 
      border: 1px solid var(--border-color); 
      border-radius: 8px; 
      background: var(--input-bg);
      color: var(--text-color);
    }

    #send-btn { 
      padding: 10px 20px; 
      margin-left: 10px; 
      border: none; 
      background: #007bff; 
      color: white; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: bold; 
    }

    #send-btn:hover { background: #0056b3; }
  </style>
</head>
<body>

  <div id="chat-header">
    <div id="header-info">
      <h2>🌍 Глобальный Чат</h2>
      <p id="online-status">В сети: 0</p>
    </div>
    <button id="theme-toggle">🌓 Тема</button>
  </div>

  <div id="chat-container">
    <ul id="messages"></ul>
    <form id="form">
      <input id="input-name" placeholder="Имя" required />
      <input id="input-msg" placeholder="Сообщение..." autocomplete="off" required />
      <button id="send-btn">Отправить</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const form = document.getElementById('form');
    const inputMsg = document.getElementById('input-msg');
    const inputName = document.getElementById('input-name');
    const messages = document.getElementById('messages');
    const themeToggle = document.getElementById('theme-toggle');
    const onlineStatus = document.getElementById('online-status');

    // Восстанавливаем сохраненное имя пользователя из памяти браузера
    if (localStorage.getItem('chat-nickname')) {
      inputName.value = localStorage.getItem('chat-nickname');
    }

    // Следим за изменением имени и сохраняем его в память
    inputName.addEventListener('input', () => {
      localStorage.setItem('chat-nickname', inputName.value);
    });

    // Логика переключения темы
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      if (currentTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    });

    // Функция для создания элемента сообщения на экране
    function appendMessage(data) {
      const item = document.createElement('li');
      
      // Выводим имя, текст и время отправки
      item.innerHTML = `
        <div><strong>${data.name}:</strong> ${data.text}</div>
        <div class="msg-time">${data.time || '00:00'}</div>
      `;
      
      // Сверяем имя автора с именем в поле ввода для подсветки
      if (data.name === inputName.value) {
        item.classList.add('my-msg');
      }
      messages.appendChild(item);
      messages.scrollTop = messages.scrollHeight; // Плавный скролл вниз
    }

    // ТУТ МАГИЯ: Обновляем счётчик онлайн на экране
    socket.on('online count', (count) => {
      onlineStatus.textContent = `В сети: ${count}`;
    });

    // Принимаем всю историю сообщений от сервера при входе/обновлении
    socket.on('chat history', (history) => {
      messages.innerHTML = ''; // Очищаем экран перед рендером истории
      history.forEach(data => {
        appendMessage(data);
      });
    });

    // Отправка нового сообщения
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (inputMsg.value.trim() && inputName.value.trim()) {
        localStorage.setItem('chat-nickname', inputName.value);

        socket.emit('chat message', {
          name: inputName.value,
          text: inputMsg.value
        });
        inputMsg.value = '';
      }
    });

    // Получение новых сообщений в реальном времени
    socket.on('chat message', (data) => {
      appendMessage(data);
    });
  </script>
</body>
</html>
